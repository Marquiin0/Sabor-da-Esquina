<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Confirmado! | Sabor da Esquina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <script type="module" src="/src/confirmation.ts"></script>
</head>
<body>
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <div class="confirm">
    <div class="confirm__card">
      <!-- Animated checkmark -->
      <div class="confirm__check">
        <svg class="confirm__check-svg" viewBox="0 0 52 52" width="80" height="80">
          <circle class="confirm__check-circle" cx="26" cy="26" r="25" fill="none" stroke="currentColor" stroke-width="2"/>
          <path class="confirm__check-path" fill="none" stroke="currentColor" stroke-width="3" d="M14 27l7.8 7.8L38 18"/>
        </svg>
      </div>

      <h1 class="confirm__title">Pedido Confirmado!</h1>
      <p class="confirm__subtitle">Seu pedido foi recebido com sucesso</p>

      <div class="confirm__order-number">
        <span class="confirm__order-label">Número do pedido</span>
        <span class="confirm__order-value" id="order-number">#SE-000000</span>
      </div>

      <div class="confirm__details" id="order-details">
        <div class="confirm__detail">
          <span class="confirm__detail-icon">⏱️</span>
          <div>
            <span class="confirm__detail-label">Tempo estimado</span>
            <span class="confirm__detail-value" id="order-time">30-45 min</span>
          </div>
        </div>
        <div class="confirm__detail">
          <span class="confirm__detail-icon">💳</span>
          <div>
            <span class="confirm__detail-label">Pagamento</span>
            <span class="confirm__detail-value" id="order-payment">Pix</span>
          </div>
        </div>
        <div class="confirm__detail">
          <span class="confirm__detail-icon">💰</span>
          <div>
            <span class="confirm__detail-label">Total pago</span>
            <span class="confirm__detail-value confirm__detail-value--price" id="order-total">R$ 0,00</span>
          </div>
        </div>
      </div>

      <!-- Items summary -->
      <div class="confirm__items" id="order-items"></div>

      <!-- Address -->
      <div class="confirm__address" id="order-address"></div>

      <!-- Actions -->
      <div class="confirm__actions">
        <button class="btn btn--primary btn--lg confirm__btn" id="track-order">
          📍 Rastrear Pedido
        </button>
        <a href="index.html" class="btn btn--outline btn--lg confirm__btn confirm__btn--outline">
          ← Voltar ao Início
        </a>
      </div>
    </div>
  </div>

</body>
</html>
