<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta | Sabor da Esquina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <script type="module" src="/src/account.ts"></script>
</head>
<body>
  <div class="acc">
    <!-- Header -->
    <header class="acc__header">
      <div class="container acc__header-container">
        <a href="index.html" class="acc__logo">
          <div class="acc__logo-icon">S</div>
          <span>Sabor <i>da Esquina</i></span>
        </a>
        <span class="acc__greeting" id="acc-greeting">Olá!</span>
        <a href="index.html" class="acc__header-back">← Início</a>
      </div>
    </header>

    <main class="acc__main">
      <div class="container acc__layout">
        <!-- Sidebar -->
        <nav class="acc__sidebar">
          <div class="acc__sidebar-user" id="acc-sidebar-user"></div>
          <div class="acc__sidebar-nav">
            <button class="acc__nav-item acc__nav-item--active" data-tab="dashboard">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Minha Conta
            </button>
            <button class="acc__nav-item" data-tab="orders">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Meus Pedidos
            </button>
            <button class="acc__nav-item" data-tab="coupons">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              Meus Cupons
            </button>
            <button class="acc__nav-item" data-tab="addresses">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Endereços
            </button>
            <button class="acc__nav-item" data-tab="profile">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Meus Dados
            </button>
            <div class="acc__nav-divider"></div>
            <button class="acc__nav-item acc__nav-item--logout" data-tab="logout">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sair
            </button>
          </div>
        </nav>

        <!-- Content Area -->
        <div class="acc__content" id="acc-content"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="cart-toast" id="cart-toast" role="status" aria-live="polite">
    <span class="cart-toast__icon">✓</span>
    <span class="cart-toast__text" id="cart-toast-text"></span>
  </div>
</body>
</html>
